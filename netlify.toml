[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes (/home, /dashboard, /recipes) resolve
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
